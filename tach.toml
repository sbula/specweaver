exclude = []
source_roots = [
    ".",
]
exact = true

[[modules]]
path = "src.specweaver.api"

[[modules]]
path = "src.specweaver.cli"

[[modules]]
path = "src.specweaver.config"
depends_on = []

[[modules]]
path = "src.specweaver.context"
depends_on = []

[[modules]]
path = "src.specweaver.graph"
depends_on = []

[[modules]]
path = "src.specweaver.llm"
depends_on = [
]

[[modules]]
path = "src.specweaver.logging"
depends_on = []

[[modules]]
path = "src.specweaver.project"
depends_on = []

[[modules]]
path = "src.specweaver.standards"
depends_on = []

[[modules]]
path = "src.specweaver.validation"
depends_on = []


[[interfaces]]
from = ["src.specweaver.project"]
expose = ["constitution", "scaffold", "discovery"]

[[interfaces]]
from = ["src.specweaver.context"]
expose = ["analyzers", "provider", "hitl_provider", "inferrer"]

[[interfaces]]
from = ["src.specweaver.graph"]
expose = ["topology", "selectors"]

[[interfaces]]
from = ["src.specweaver.llm"]
expose = ["models", "adapters.base", "adapters.registry", "prompt_builder", "mention_scanner.models", "mention_scanner.scanner", "telemetry", "router", "collector", "factory", "lineage"]

[[interfaces]]
from = ["src.specweaver.loom"]
expose = ["atoms", "commons", "dispatcher", "security", "tools"]

[[interfaces]]
from = ["src.specweaver.validation"]
expose = ["executor", "loader", "models", "pipeline", "pipeline_loader", "registry", "rules", "spec_kind", "drift_detector", "inheritance"]
# Note: 'runner' is strictly OMITTED from expose array to enforce soft-deprecation.

