name: review
level: module
purpose: >
  LLM-powered spec and code review with structured verdicts (ACCEPTED/DENIED).
  Supports constitution injection for project-rule-aware reviews.

archetype: orchestrator

consumes:
  - specweaver/llm
  - specweaver/config

forbids:
  - specweaver/loom/*

exposes:
  - Reviewer
  - ReviewResult
  - ReviewVerdict
  - ReviewFinding

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
