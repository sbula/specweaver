name: project
level: module
purpose: >
  Project discovery and scaffolding (find project root, create directory structures).

archetype: adapter

consumes:
  - specweaver/config

forbids:
  - specweaver/loom/*
  - specweaver/llm

exposes:
  - discover_project_root
  - scaffold_project
