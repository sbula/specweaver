name: project
level: module
purpose: >
  Project discovery, scaffolding, and constitution management
  (find project root, create directory structures, load and validate constitution files).

archetype: adapter

consumes:
  - specweaver/config
  - specweaver/graph

forbids:
  - specweaver/loom/*
  - specweaver/llm

exposes:
  - resolve_project_path
  - scaffold_project
  - ScaffoldResult
  - sync_tach_toml
  - TachSyncResult
  - find_constitution
  - find_all_constitutions
  - check_constitution
  - generate_constitution
  - generate_constitution_from_standards
  - is_unmodified_starter
  - ConstitutionInfo

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
