name: flow
level: module
purpose: >
  Pipeline models, parsing, execution, gates, and feedback loops for the SpecWeaver flow engine.

description: |
  Defines the data model for pipelines (PipelineDefinition, PipelineStep,
  GateDefinition, StepAction, StepTarget) and provides YAML parsing.
  Includes step handlers (validate, review, draft, implement, test, lint-fix),
  gate logic (auto/HITL/validation), state management, and the pipeline runner
  with retry and feedback loop support.

archetype: orchestrator

consumes:
  - specweaver/config
  - specweaver/llm  # Pure logic modules must not depend on LLMs or prompt generation.
  - specweaver/review
  - specweaver/implementation
  - specweaver/planning
  - specweaver/validation
  - specweaver/loom/atoms/git
  - specweaver/loom/atoms/qa_runner
  - specweaver/loom/atoms/code_structure
  - specweaver/loom/dispatcher
  - specweaver/loom/security

forbids:
  - specweaver/loom/tools/*  # Atoms and raw orchestrators must not execute intent-gated agent tools directly.
  - specweaver/loom/commons/*  # commons is internal to loom — only atoms/tools may consume it
  - specweaver/drafting  # Rules and adapters must remain isolated from interactive drafts.
  - specweaver/context

exposes:
  - PipelineDefinition
  - PipelineStep
  - GateDefinition
  - StepAction
  - StepTarget
  - StepHandlerRegistry
  - LintFixHandler
  - DecomposeFeatureHandler
  - OrchestrateComponentsHandler
  - PipelineRunner
  - RunContext
  - RunnerEventCallback
  - RichPipelineDisplay
  - JsonPipelineDisplay

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: true
  concurrency_model: none
