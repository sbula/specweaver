name: commons
level: meta-module
purpose: >
  Shared infrastructure used by both tools and atoms — executors, interfaces, base classes.

description: |
  Commons sits at the bottom of the loom dependency tree. Both tools/ and atoms/
  depend on commons/, but commons/ never depends on either. This prevents
  circular dependencies between the agent-facing and engine layers.

archetype: adapter

consumes: []

forbids:
  - specweaver/loom/tools/*  # Atoms and raw orchestrators must not execute intent-gated agent tools directly.
  - specweaver/loom/atoms/*  # Agent-facing tools and commons must not access internal unrestricted engine atoms.

exposes:
  - git
  - qa_runner

constraints:
  - "Must never import from tools/ or atoms/ — dependency flows upward only"

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
