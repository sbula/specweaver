name: protocol
level: core-loom-component
purpose: >
  Provides external schema and protocol loading tools via PyPI (ruamel.yaml).

description: |
  Interfaces into external schema representations (.proto, .yaml).
  Safely restricts structural bounds using Pydantic typing to avoid dict hallucinogen.

archetype: adapter

consumes:
  - specweaver/commons

forbids:
  - specweaver/loom/tools/*
  - specweaver/loom/atoms/*

exposes:
  - ProtocolSchemaInterface
  - ProtocolEndpoint
  - ProtocolMessage
  - ProtocolSchemaSet
  - ProtocolSchemaError

operational:
  async_ready: true
  concurrency_model: thread-safe
