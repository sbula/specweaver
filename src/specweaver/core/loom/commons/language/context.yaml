name: language-commons
level: module
purpose: >
  Language-specific implementation repository for external command line test runners
  securely wrapped for Loom sandbox execution.

description: |
  Provides language-specific implementations for QARunnerInterface (pytest, rust, etc.).
  It groups Side-Effects by language.
  Consumed transparently via dependency-injection into the Pure-Logic systems.

archetype: adapter

consumes:
  - specweaver/commons
  - specweaver/loom/commons/qa_runner
  - specweaver/workspace/parsers

forbids:
  - specweaver/loom/tools/*  # Atoms and raw orchestrators must not execute intent-gated agent tools directly.
  - specweaver/loom/atoms/*  # Agent-facing tools and commons must not access internal unrestricted engine atoms.

exposes:
  - java
  - kotlin
  - python
  - rust
  - typescript

constraints: []

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
