name: mcp_tool
level: module
purpose: >
  Exposes Model Context Protocol bounds exploration capabilities exclusively to the Architect role.
description: |
  Because tools operate on behalf of untrusted LLMs, this boundary safely establishes
  transient MCP execution windows via MCPExecutor directly, actively forbidding use
  of persistent internal infrastructure Atoms.

archetype: facade

consumes:
  - specweaver/loom/commons/mcp

forbids:
  - specweaver/loom/atoms/*

exposes:
  - ArchitectMCPInterface

operational:
  async_ready: false
  concurrency_model: local
