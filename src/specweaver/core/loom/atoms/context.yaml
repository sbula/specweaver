name: atoms
level: meta-module
purpose: >
  Engine-internal workflow operations with unrestricted access for orchestration.

description: |
  Atoms represent engine-internal workflow operations (git, filesystem,
  test runner). Unlike tools, atoms are not agent-facing and can bypass
  agent restrictions. Includes git operations (EngineGitExecutor) and
  test execution/linting/complexity checking (QARunnerAtom).

archetype: orchestrator

consumes:
  - specweaver/loom/commons/*  # High-level models must not execute raw executors directly; they must use atoms.

forbids:
  - specweaver/loom/tools/*  # Atoms and raw orchestrators must not execute intent-gated agent tools directly.

exposes:
  - git
  - qa_runner

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
