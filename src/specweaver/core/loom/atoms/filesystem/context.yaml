name: filesystem-atom
level: module
purpose: >
  Engine-level filesystem operations (scaffold, backup, restore, context aggregation).

description: |
  FileSystemAtom provides flow-level file operations for the Engine:
  scaffold (create directory structure + context.yaml from spec boundaries),
  backup/restore (for engine rollback), aggregate_context (build project-wide
  boundary map), validate_boundaries (check consistency).

archetype: orchestrator

consumes:
  - specweaver/loom/commons/filesystem

forbids:
  - specweaver/loom/tools/*  # Atoms and raw orchestrators must not execute intent-gated agent tools directly.

exposes:
  - FileSystemAtom
  - FileSystemAtomError

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
