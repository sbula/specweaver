name: language-atom
level: package
purpose: >
  Provides Atom Proxy for language capabilities (detection, formatting, conversions).

description: |
  An Atom wrapper around commons/language detection and scenario converter logic.
  Used by flow to interact with language utilities via the secure Atom boundary.

archetype: orchestrator

consumes:
  - specweaver/loom/commons/language

forbids:
  - specweaver/loom/tools/*
