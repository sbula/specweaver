name: implementation
level: module
purpose: >
  Code and test generation from approved component specs.
  Supports constitution injection for project-rule-aware generation.

archetype: orchestrator

consumes:
  - specweaver/llm  # Pure logic modules must not depend on LLMs or prompt generation.
  - specweaver/config
  - specweaver/validation

forbids: []

exposes:
  - CodeGenerator

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
