name: scenario_validation
description: >
  Independent verification pipeline for SpecWeaver (Feature 3.28).
  Generates scenarios from spec + API contract, then mechanically converts
  them to parametrized pytest files with @trace tags.
version: "1.0"

steps:
  - name: generate_scenarios
    action: generate
    target: scenario
    description: "LLM-driven scenario generation from spec + contract"
    gate:
      type: auto
      condition: completed
      on_fail: abort

  - name: convert_to_pytest
    action: convert
    target: scenario
    description: "Mechanical YAML to parametrized pytest conversion"
    gate:
      type: auto
      condition: completed
      on_fail: abort
