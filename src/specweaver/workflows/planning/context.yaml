name: planning
level: module
purpose: >
  LLM-assisted architectural feature decomposition and implementation planning
  from approved specs. Generates structured JSON Plan artifacts with architecture
  decisions, boundaries, tech stack choices, file layout, and constraint reasoning.

archetype: orchestrator

consumes:
  - specweaver/llm  # Pure logic modules must not depend on LLMs or prompt generation.
  - specweaver/config
  - specweaver/context

forbids:
  - specweaver/sandbox/*  # The loom boundary isolates execution (git, filesystem, processes). High-level orchestrators must never bypass the flow engine to natively execute raw processes.

exposes:

  - Planner
  - PlanArtifact
  - render_plan_markdown
  - FeatureDecomposer
  - DecompositionPlan

operational:
  async_ready: true
  concurrency_model: none
