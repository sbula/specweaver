name: standards
level: module
purpose: >
  Auto-discover coding standards from codebase analysis. Extracts naming
  conventions, patterns, error handling, and architectural decisions via AST
  parsing with recency weighting. Supports HITL document review before
  storing confirmed standards in the DB for prompt injection.

archetype: orchestrator

consumes:
  - specweaver/config    # DB for standards storage

forbids:
  - specweaver/loom/*

exposes:
  - StandardsAnalyzer
  - PythonStandardsAnalyzer
  - CategoryResult
  - ScopeReport
  - StandardsInferrer
  - StandardsReviewer

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
