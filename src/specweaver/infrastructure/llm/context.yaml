name: llm
level: module
purpose: >
  LLM provider abstraction layer with multi-provider adapter pattern
  and structured prompt builder with token-aware truncation and constitution support.

description: |
  Provides a provider-agnostic interface for LLM calls. The base adapter defines
  the contract; concrete adapters implement provider-specific logic.
  Error hierarchy translates provider errors into domain-specific exceptions.
  PromptBuilder assembles structured prompts with XML-tagged blocks, supporting
  instructions, files, context, topology, and constitution injection.

archetype: adapter

consumes:
  - specweaver/config

forbids:
  - specweaver/sandbox/*  # The loom boundary isolates execution (git, filesystem, processes). High-level orchestrators must never bypass the flow engine to natively execute raw processes.

exposes:
  - LLMAdapter
  - GeminiAdapter
  - OpenAIAdapter
  - AnthropicAdapter
  - MistralAdapter
  - QwenAdapter
  - get_adapter_class
  - get_merged_default_costs
  - LLMResponse
  - LLMError
  - PromptBuilder
  - TaskType
  - TelemetryCollector
  - UsageRecord
  - extract_artifact_uuid
  - wrap_artifact_tag
  - PromptSlot
  - RenderProfile

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: true
  concurrency_model: none
