name: adapters
level: sub-module
purpose: >
  Concrete LLM provider adapters implementing the base adapter interface.

description: |
  Concrete LLM provider adapters with auto-discovery registry.
  Each adapter is self-describing (provider_name, api_key_env_var, default_costs).
  Adding a new provider = one file, zero other changes.

archetype: adapter

consumes:
  - specweaver/llm  # Pure logic modules must not depend on LLMs or prompt generation.

forbids:
  - specweaver/sandbox/*  # The loom boundary isolates execution (git, filesystem, processes). High-level orchestrators must never bypass the flow engine to natively execute raw processes.
  - specweaver/validation
  - specweaver/drafting  # Rules and adapters must remain isolated from interactive drafts.

exposes:
  - LLMAdapter
  - GeminiAdapter
  - OpenAIAdapter
  - AnthropicAdapter
  - MistralAdapter
  - QwenAdapter
  - get_all_adapters
  - get_adapter_class
  - get_merged_default_costs

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
