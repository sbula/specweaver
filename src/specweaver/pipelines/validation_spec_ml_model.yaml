# ML-model profile -- relaxed size, strict terminology.
name: validation_spec_ml_model
description: Very lenient thresholds for ML/AI projects with research-style specs
extends: validation_spec_default
override:
  s05_day_test:
    params: { warn_threshold: 50, fail_threshold: 100 }
  s11_terminology:
    params: { warn_threshold: 2, fail_threshold: 4 }
  s08_ambiguity:
    params: { warn_threshold: 2, fail_threshold: 5 }
