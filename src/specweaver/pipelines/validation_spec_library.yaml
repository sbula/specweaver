# Library profile -- stricter on ambiguity and terminology.
name: validation_spec_library
description: Strict thresholds for public-facing libraries and SDKs
extends: validation_spec_default
override:
  s05_day_test:
    params: { warn_threshold: 20, fail_threshold: 40 }
  s08_ambiguity:
    params: { warn_threshold: 2, fail_threshold: 5 }
  s11_terminology:
    params: { warn_threshold: 2, fail_threshold: 4 }
