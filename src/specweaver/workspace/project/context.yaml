name: project
level: module
purpose: >
  Project discovery, scaffolding, and constitution management
  (find project root, create directory structures, load and validate constitution files).

archetype: adapter

consumes:
  - specweaver/config
  - specweaver/graph
  - specweaver/workspace/context
  - specweaver/workspace/parsers

forbids:
  - specweaver/loom/*  # The loom boundary isolates execution (git, filesystem, processes). High-level orchestrators must never bypass the flow engine to natively execute raw processes.
  - specweaver/llm  # Pure logic modules must not depend on LLMs or prompt generation.

exposes:
  - resolve_project_path
  - scaffold_project
  - ScaffoldResult
  - sync_tach_toml
  - TachSyncResult
  - find_constitution
  - find_all_constitutions
  - check_constitution
  - generate_constitution
  - generate_constitution_from_standards
  - is_unmodified_starter
  - ConstitutionInfo

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
