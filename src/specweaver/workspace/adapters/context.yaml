name: adapters
level: module
purpose: >
  Translation layers that bridge Workspace ASTs to foreign domains.

description: |
  Contains pure-logic adapters that take standard Tree-Sitter outputs
  and restructure them into the format required by external boundaries
  (such as the Universal Graph Ontology).

archetype: pure-logic

consumes:
  - specweaver/workspace/parsers

forbids:
  - specweaver/loom/*
  - specweaver/interfaces/cli

exposes:
  - graph_adapter

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: true
  concurrency_model: none
