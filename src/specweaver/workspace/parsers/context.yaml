name: parsers
level: module
purpose: >
  Polyglot Tree-Sitter AST extractions and skeletons for the workspace.

description: |
  Provides pure-logic structural parsers for multiple languages (Java, Python, Rust, TS, Kotlin).
  These extract standard imports, symbols, and skeletons from native source files using Tree-Sitter grammars.
  This boundary is strictly pure logic and must not execute code.

archetype: pure-logic

consumes: []

forbids:
  - specweaver/loom/*  # Pure logic modules must not depend on physical sandboxes.

exposes:
  - interfaces
  - factory
  - python/codestructure
  - java/codestructure
  - kotlin/codestructure
  - rust/codestructure
  - typescript/codestructure
  - c/codestructure
  - cpp/codestructure
  - go/codestructure
  - markdown/codestructure
  - sql/codestructure
  - exclusions

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: true
  concurrency_model: none
