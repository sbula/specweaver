# Workspace context boundary
archetype: workspace
description: |
  Contains all logic for managing user projects, AST parsing, and standards.
  Workspace MUST NOT depend on workflow orchestration or CLI interfaces.
dependencies:
  allowed:
    - src.specweaver.commons
    - src.specweaver.core.config
    - src.specweaver.core.loom
  forbidden:
    - src.specweaver.interfaces
    - src.specweaver.workflows
