name: code
level: sub-module
purpose: >
  Code validation rules (C01-C08) for static analysis of generated code.

description: |
  Contains rules that validate generated code quality: syntax validity (C01),
  test existence (C02), test pass (C03), coverage (C04), import direction (C05),
  no bare except (C06), no orphan TODO (C07), and type hints (C08).

archetype: pure-logic

consumes:
  - specweaver/validation

forbids:
  - specweaver/sandbox/*  # The loom boundary isolates execution (git, filesystem, processes). High-level orchestrators must never bypass the flow engine to natively execute raw processes.
  - specweaver/llm  # Pure logic modules must not depend on LLMs or prompt generation.
  - specweaver/drafting  # Rules and adapters must remain isolated from interactive drafts.

exposes:
  - SyntaxValidRule
  - TestsExistRule
  - TestsPassRule
  - CoverageRule
  - ImportDirectionRule
  - NoBareExceptRule
  - NoOrphanTodoRule
  - TypeHintsRule
  - TraceabilityRule
  - C12ArchetypeCodeBoundsRule
  - C13ContractDriftRule

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
