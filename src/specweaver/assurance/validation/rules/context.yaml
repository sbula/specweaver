name: rules
level: sub-module
purpose: >
  Validation rule implementations organized by target type (spec and code).

description: |
  Container package for all validation rules. Rules are organized into
  sub-packages by target: spec rules (S01-S11) for specification quality
  and code rules (C01-C08) for generated code quality. Each rule implements
  the Rule base class from the parent validation module.

archetype: pure-logic

consumes:
  - specweaver/validation

forbids:
  - specweaver/sandbox/*  # The loom boundary isolates execution (git, filesystem, processes). High-level orchestrators must never bypass the flow engine to natively execute raw processes.
  - specweaver/llm  # Pure logic modules must not depend on LLMs or prompt generation.
  - specweaver/drafting  # Rules and adapters must remain isolated from interactive drafts.

exposes:
  - spec/*
  - code/*

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
