name: graph
level: module
purpose: >
  Topology graph and context selectors for cross-cutting dependency analysis.

description: |
  Builds a project-wide dependency graph from context.yaml boundary manifests.
  TopologyGraph provides dependency tracking, impact analysis, operational
  warnings (SLA mismatches), and constraint sharing. Selectors enable
  cross-cutting queries (e.g., "all modules with archetype=adapter").

archetype: pure-logic

consumes:
  - specweaver/context

forbids:
  - specweaver/loom/*  # The loom boundary isolates execution (git, filesystem, processes). High-level orchestrators must never bypass the flow engine to natively execute raw processes.
  - specweaver/llm  # Pure logic modules must not depend on LLMs or prompt generation.
  - specweaver/drafting  # Rules and adapters must remain isolated from interactive drafts.
  - specweaver/implementation

exposes:
  - TopologyGraph
  - Selectors

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
