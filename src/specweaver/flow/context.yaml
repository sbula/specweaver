name: flow
level: module
purpose: >
  Pipeline models, parsing, execution, gates, and feedback loops for the SpecWeaver flow engine.

description: |
  Defines the data model for pipelines (PipelineDefinition, PipelineStep,
  GateDefinition, StepAction, StepTarget) and provides YAML parsing.
  Includes step handlers (validate, review, draft, implement, test, lint-fix),
  gate logic (auto/HITL/validation), state management, and the pipeline runner
  with retry and feedback loop support.

archetype: orchestrator

consumes:
  - specweaver/loom/atoms/test_runner
  - specweaver/loom/commons/test_runner

forbids:
  - specweaver/loom/tools/*
  - specweaver/drafting
  - specweaver/context

exposes:
  - PipelineDefinition
  - PipelineStep
  - GateDefinition
  - StepAction
  - StepTarget
  - StepHandlerRegistry
  - LintFixHandler
  - PipelineRunner

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: true
  concurrency_model: none
