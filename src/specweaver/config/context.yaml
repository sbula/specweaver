name: config
level: module
purpose: >
  Application configuration (Pydantic-based settings) and multi-project
  SQLite database for projects, LLM profiles, validation overrides,
  and constitution size limits.

archetype: pure-logic

consumes: []

forbids:
  - specweaver/loom/*

exposes:
  - SpecWeaverSettings
  - ValidationSettings
  - LLMSettings
  - Database
  - load_settings
  - DALResolver

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
