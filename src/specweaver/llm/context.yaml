name: llm
level: module
purpose: >
  LLM provider abstraction layer with adapter pattern (currently Google Gemini).

description: |
  Provides a provider-agnostic interface for LLM calls. The base adapter defines
  the contract; concrete adapters (GeminiAdapter) implement provider-specific logic.
  Error hierarchy translates provider errors into domain-specific exceptions.

archetype: adapter

consumes:
  - specweaver/config

forbids:
  - specweaver/loom/*

exposes:
  - LLMAdapter
  - GeminiAdapter
  - LLMResponse
  - LLMError

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
