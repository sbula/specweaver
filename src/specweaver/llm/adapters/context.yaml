name: adapters
level: sub-module
purpose: >
  Concrete LLM provider adapters implementing the base adapter interface.

description: |
  Concrete LLM provider adapters with auto-discovery registry.
  Each adapter is self-describing (provider_name, api_key_env_var, default_costs).
  Adding a new provider = one file, zero other changes.

archetype: adapter

consumes:
  - specweaver/llm

forbids:
  - specweaver/loom/*
  - specweaver/validation
  - specweaver/drafting

exposes:
  - LLMAdapter
  - GeminiAdapter
  - OpenAIAdapter
  - AnthropicAdapter
  - MistralAdapter
  - QwenAdapter
  - get_all_adapters
  - get_adapter_class
  - get_merged_default_costs

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
