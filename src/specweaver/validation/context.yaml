name: validation
level: module
purpose: >
  Spec quality validation through the 10-test battery (structure + completeness rules).

description: |
  Contains the validation rule engine, individual rule implementations,
  and the runner that applies rules to spec documents. Rules check structure
  (one-sentence, single-setup, size budget, dependency direction, conjunction count)
  and completeness (weasel words, examples, error paths, done definition, scenarios).

archetype: pure-logic

consumes:
  - specweaver/config
  - specweaver/loom/commons/qa_runner

forbids:
  - specweaver/loom/*
  - specweaver/llm

exposes:
  - ValidationRunner
  - ValidationResult
  - RuleSeverity

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
