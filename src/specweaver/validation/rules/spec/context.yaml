name: spec
level: sub-module
purpose: >
  Spec validation rules (S01-S11) from the 10-test battery for specification quality.

description: |
  Contains rules that validate spec quality: one-sentence purpose (S01),
  single test setup (S02), stranger test (S03), dependency direction (S04),
  day test (S05), concrete example (S06), test-first (S07), ambiguity (S08),
  error path (S09), done definition (S10), and terminology consistency (S11).

archetype: pure-logic

consumes:
  - specweaver/validation

forbids:
  - specweaver/loom/*  # The loom boundary isolates execution (git, filesystem, processes). High-level orchestrators must never bypass the flow engine to natively execute raw processes.
  - specweaver/llm  # Pure logic modules must not depend on LLMs or prompt generation.
  - specweaver/drafting  # Rules and adapters must remain isolated from interactive drafts.

exposes:
  - OneSentenceRule
  - SingleSetupRule
  - StrangerTestRule
  - DependencyDirectionRule
  - DayTestRule
  - ConcreteExampleRule
  - TestFirstRule
  - AmbiguityRule
  - ErrorPathRule
  - DoneDefinitionRule
  - TerminologyRule

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
