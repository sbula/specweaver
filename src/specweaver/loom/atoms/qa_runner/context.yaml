name: test-runner-atom
level: module
purpose: >
  Engine-level test execution, linting, and complexity checking via intent dispatch.

description: |
  QARunnerAtom provides intent-based access to test runner operations
  for the flow engine. Supports intents: run_tests, run_linter, run_linter_fix,
  and run_complexity. Delegates to the language-specific runner from commons.

archetype: orchestrator

consumes:
  - specweaver/loom/commons/qa_runner

forbids:
  - specweaver/loom/tools/*

exposes:
  - QARunnerAtom

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
