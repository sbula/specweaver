name: git-atom
level: module
purpose: >
  Engine-level git workflow operations (checkpoint, isolate, integrate, restore, publish).

description: |
  GitAtom dispatches high-level engine intents into sequences of EngineGitExecutor
  calls. It handles branching strategies, merge conflict detection, and rollback
  operations that are too powerful for agent-facing tools.

archetype: orchestrator

consumes:
  - specweaver/loom/commons/git

forbids:
  - specweaver/loom/tools/*

exposes:
  - GitAtom
  - GitAtomError

constraints:
  - "Must use EngineGitExecutor, not GitExecutor"
  - "Must not expose any methods directly to agents"
