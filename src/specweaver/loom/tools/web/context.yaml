name: web
level: module
purpose: >
  Web search and URL reading operations for agents.

description: |
  WebTool provides intent-based web operations (web_search, read_url)
  with role-based access control. Agents can search the web and read
  URL content during planning and review phases.

  Web tools are optional — they only activate when search credentials
  are configured (SEARCH_API_KEY + SEARCH_ENGINE_ID env vars).

archetype: facade

consumes: []

forbids:
  - specweaver/loom/atoms/*

exposes:
  - WebTool
  - WebToolResult
  - create_web_interface
  - PlannerWebInterface
  - ReviewerWebInterface

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
