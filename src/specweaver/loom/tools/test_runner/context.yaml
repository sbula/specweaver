name: test-runner-tools
level: module
purpose: >
  Role-restricted test runner operations for agents with intent validation.

description: |
  TestRunnerTool wraps TestRunnerAtom with role-based access control.
  Supports intents: run_tests, run_linter, run_linter_fix, run_complexity.
  Role interfaces (ImplementerTestInterface, ReviewerTestInterface) expose
  only the intents permitted for each role. Reviewers cannot use fix=True.

archetype: facade

consumes:
  - specweaver/loom/atoms/test_runner

forbids:
  - specweaver/loom/commons/*

exposes:
  - TestRunnerTool
  - TestRunnerToolError
  - ToolResult
  - ImplementerTestInterface
  - ReviewerTestInterface
  - create_test_runner_interface
  - ROLE_INTENTS

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
