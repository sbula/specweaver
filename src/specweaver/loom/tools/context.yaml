name: tools
level: meta-module
purpose: >
  Agent-facing capability providers with role-based access control.

description: |
  Tools expose git, filesystem, and test runner operations to agents through
  role-specific interfaces. Each interface physically hides methods not
  whitelisted for the agent's role, saving tokens and preventing misuse.

archetype: facade

consumes:
  - specweaver/loom/commons/*  # High-level models must not execute raw executors directly; they must use atoms.

forbids:
  - specweaver/loom/atoms/*  # Agent-facing tools and commons must not access internal unrestricted engine atoms.

exposes:
  - git
  - qa_runner

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
