name: tools
level: meta-module
purpose: >
  Agent-facing capability providers with role-based access control.

description: |
  Tools expose git, filesystem, and test runner operations to agents through
  role-specific interfaces. Each interface physically hides methods not
  whitelisted for the agent's role, saving tokens and preventing misuse.

archetype: facade

consumes:
  - specweaver/loom/commons/*

forbids:
  - specweaver/loom/atoms/*

exposes:
  - git
  - test_runner

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
