name: language-commons
level: module
purpose: >
  Language-specific implementation repository for external command line test runners
  and AST parsing functionality securely wrapped for Loom sandbox execution.

description: |
  Provides language-specific implementations for QARunnerInterface (pytest, rust, etc.)
  and AST parsers (tree-sitter queries). It groups Side-Effects by language.
  Consumed transparently via dependency-injection into the Pure-Logic systems.

archetype: adapter

consumes:
  - specweaver/commons
  - specweaver/loom/commons/qa_runner

forbids:
  - specweaver/loom/tools/*
  - specweaver/loom/atoms/*

exposes:
  - java
  - kotlin
  - python
  - rust
  - typescript

constraints:
  - "Language definitions strictly separate I/O components from Pure Logic formatters"

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
