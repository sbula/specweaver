name: test-runner-commons
level: module
purpose: >
  Language-agnostic test runner interface and Python implementation for test execution, linting, and complexity checks.

description: |
  Defines the QARunnerInterface ABC with abstract methods for run_tests,
  run_linter, and run_complexity. Result dataclasses (TestRunResult, LintRunResult,
  ComplexityRunResult) provide structured output. PythonQARunner implements
  the interface using pytest and ruff subprocesses.

archetype: adapter

consumes:
  - specweaver/commons

forbids:
  - specweaver/loom/tools/*
  - specweaver/loom/atoms/*

exposes:
  - QARunnerInterface
  - PythonQARunner
  - TestRunResult
  - TestFailure
  - LintRunResult
  - LintError
  - ComplexityRunResult
  - ComplexityViolation

constraints:
  - "All subprocess calls must have timeouts"
  - "PythonQARunner must not modify source files unless fix=True is passed"

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
