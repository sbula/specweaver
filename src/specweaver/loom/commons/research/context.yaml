name: research-infrastructure
level: module
purpose: >
  Shared research infrastructure — workspace boundaries, tool definitions,
  and executor for LLM function-calling tool dispatch.

description: |
  Provides the glue between LLM function calling and the tool implementations
  in loom/tools/. WorkspaceBoundary enforces path access during research.
  ToolExecutor dispatches tool calls from the LLM to tool implementations.
  Tool definitions describe tools in provider-agnostic format.

archetype: adapter

consumes:
  - specweaver/llm/models
  - specweaver/loom/commons/filesystem/search
  - specweaver/loom/tools/web

forbids:
  - specweaver/loom/atoms/*

exposes:
  - WorkspaceBoundary
  - ToolExecutor

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: true
  concurrency_model: none
