name: git-executor
level: module
purpose: >
  Low-level git command execution with whitelist enforcement and security controls.

description: |
  GitExecutor runs git subprocess commands against a working directory. It enforces
  a configurable whitelist of allowed commands and a permanent blocklist of dangerous
  commands (push, merge, pull, rebase, etc.).

  EngineGitExecutor is a subclass that bypasses the permanent blocklist for internal
  engine operations that require full git access.

archetype: adapter

consumes: []

forbids:
  - specweaver/loom/tools/*  # Atoms and raw orchestrators must not execute intent-gated agent tools directly.
  - specweaver/loom/atoms/*  # Agent-facing tools and commons must not access internal unrestricted engine atoms.

exposes:
  - GitExecutor
  - EngineGitExecutor
  - ExecutorResult
  - GitExecutorError

constraints:
  - "GitExecutor must never execute commands not in its whitelist"
  - "EngineGitExecutor is for internal engine use only — never exposed to agents"
  - "All subprocess calls must have timeouts"

# -- Operational Metadata --------------------------------------------------
operational:
  async_ready: false
  concurrency_model: none
